<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Placement Prediction</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script defer src="/static/js/placement_prediction.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eff6ff 0%, #eef2ff 50%, #f5f3ff 100%);
      color: #111827;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-bottom: 18px;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(17, 24, 39, 0.08);
      padding: 18px;
    }
    .gradient {
      background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
      color: #fff;
    }
    .circle {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 14px auto;
      background: conic-gradient(#4f46e5 0deg, #e0e7ff 0deg);
    }
    .circle-inner {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #fff;
      color: #312e81;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 700;
    }
    .badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #e0e7ff;
      color: #312e81;
      border: 1px solid #c7d2fe;
    }
    .chart-card {
      min-height: 360px;
    }
    #pp-loading,
    #pp-error {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(17, 24, 39, 0.08);
      padding: 24px;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 140px;
    }
    #pp-loading {
      display: flex;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Placement Prediction</h1>

    <div id="pp-loading">Loading prediction...</div>

    <div id="pp-error">
      <p id="pp-error-text"></p>
    </div>

    <div id="pp-content" style="display:none;">
      <div class="cards">
        <div class="card gradient">
          <h3>Overall Placement Chance</h3>
          <div id="pp-overall-circle" class="circle">
            <div id="pp-overall-value" class="circle-inner">0%</div>
          </div>
        </div>

        <div class="card">
          <h3>Best Domain</h3>
          <h2 id="pp-best-domain">N/A</h2>
          <span class="badge">Recommended Domain</span>
        </div>
      </div>

      <div class="card chart-card">
        <h3>Domain Wise Probability</h3>
        <canvas id="pp-chart"></canvas>
      </div>
    </div>
  </div>
</body>
</html>
